<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
  <div id="streak-count">0</div>
  <div id="streak-status">da_fare</div>

  <script>
    const savedState = localStorage.getItem('duo_todo_state');
    if (savedState) {
      const state = JSON.parse(savedState);
      const todayStr = new Date().toDateString();
      const isCompletedToday = state.lastCompletedDate === todayStr;
      
      document.getElementById('streak-count').innerText = state.streak;
      document.getElementById('streak-status').innerText = isCompletedToday ? 'attivo' : 'da_fare';
    }
  </script>
</body>
</html>
