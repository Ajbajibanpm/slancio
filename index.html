<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slancio</title>
    <style>
        :root {
            --bg-color: #f7f9fa;
            --card-bg: #ffffff;
            --text-main: #3c3c3c;
            --text-sub: #afafaf;
            --border-color: #e5e5e5;
            --primary-color: #1cb0f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .widget-container {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 4px 0 var(--border-color);
            margin-bottom: 20px;
        }

        .widget-title {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sub);
            margin-bottom: 10px;
        }

        .streak-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .streak-emoji {
            font-size: 48px;
            line-height: 1;
        }

        .streak-count {
            font-size: 48px;
            font-weight: bold;
            color: var(--text-main);
        }

        .btn-slancio {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #1899d6;
            transition: all 0.1s ease;
            width: 100%;
            text-transform: uppercase;
        }

        .btn-slancio:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-slancio:disabled {
            background-color: var(--border-color);
            box-shadow: 0 4px 0 #cccccc;
            color: var(--text-sub);
            cursor: not-allowed;
        }

        .todo-container {
            width: 280px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 0 var(--border-color);
        }

        .todo-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .todo-input {
            flex: 1;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 8px;
            font-size: 14px;
        }

        .todo-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .todo-item input {
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div id="widget-title" class="widget-title">Caricamento...</div>
        <div class="streak-display">
            <span id="streak-emoji" class="streak-emoji">⏳</span>
            <span id="streak-count" class="streak-count">0</span>
        </div>
        <button id="bottone-slancio" class="btn-slancio" disabled>Attendi...</button>
    </div>

    <div class="todo-container">
        <div class="todo-input-group">
            <input type="text" id="todo-input" class="todo-input" placeholder="Nuova task...">
            <button id="todo-add" class="todo-btn">+</button>
        </div>
        <ul id="todo-list" class="todo-list"></ul>
    </div>

    <script>
        // --- 1. CONFIGURAZIONE DATABASE (JSONBin.io) ---
        const BIN_ID = "6a3cdb17f5f4af5e292d6e4d"; 
        const API_KEY = "$2a$10$A4j9.t7nUoHpV9/nQxciNu2HkFnnxMr8vyUgtdMvmLIdH8/eU30C2";
        const REQ_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        // --- 2. STATO APPLICAZIONE ---
        let state = {
            streak: 0,
            lastCompletedDate: "",
            todos: [] // I To-Do rimangono locali per dispositivo
        };

        // --- 3. FUNZIONI DATABASE ---
        async function caricaDati() {
            try {
                const res = await fetch(`${REQ_URL}/latest`, {
                    headers: { "X-Master-Key": API_KEY }
                });
                const data = await res.json();
                state.streak = data.record.streak || 0;
                state.lastCompletedDate = data.record.lastCompletedDate || "";
            } catch (e) {
                console.error("Errore recupero dati DB, provo localStorage alternativo:", e);
                const backup = localStorage.getItem('duo_todo_streak_backup');
                if (backup) {
                    const parsed = JSON.parse(backup);
                    state.streak = parsed.streak;
                    state.lastCompletedDate = parsed.lastCompletedDate;
                }
            }
            
            // Carica i To-Do locali
            const savedTodos = localStorage.getItem('duo_todos_local');
            if (savedTodos) state.todos = JSON.parse(savedTodos);
            
            render();
        }

        async function salvaDati(nuovoStreak, nuovaData) {
            // Backup locale immediato per feedback rapido
            localStorage.setItem('duo_todo_streak_backup', JSON.stringify({ streak: nuovoStreak, lastCompletedDate: nuovaData }));
            
            try {
                await fetch(REQ_URL, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": API_KEY
                    },
                    body: JSON.stringify({ streak: nuovoStreak, lastCompletedDate: nuovaData })
                });
            } catch (e) {
                console.error("Errore salvataggio DB:", e);
            }
        }

        // --- 4. AGGIORNAMENTO GRAFICA ---
        function render() {
            const todayStr = new Date().toDateString();
            const isCompletedToday = state.lastCompletedDate === todayStr;

            document.getElementById('streak-count').innerText = state.streak;
            
            if (isCompletedToday) {
                document.getElementById('streak-emoji').innerText = '🔥';
                document.getElementById('widget-title').innerText = 'Slancio Attivo!';
                document.getElementById('bottone-slancio').innerText = 'Completato';
                document.getElementById('bottone-slancio').disabled = true;
            } else {
                document.getElementById('streak-emoji').innerText = '😴';
                document.getElementById('widget-title').innerText = 'Nessuno Slancio';
                document.getElementById('bottone-slancio').innerText = 'Ottieni Slancio';
                document.getElementById('bottone-slancio').disabled = false;
            }

            // Renderizza la lista To-Do
            const listEl = document.getElementById('todo-list');
            listEl.innerHTML = '';
            state.todos.forEach((todo, index) => {
                const li = document.createElement('li');
                li.className = 'todo-item';
                li.innerHTML = `
                    <input type="checkbox" ${todo.done ? 'checked' : ''} onchange="toggleTodo(${index})">
                    <span style="${todo.done ? 'text-decoration: line-through; color: #afafaf;' : ''}">${todo.text}</span>
                `;
                listEl.appendChild(li);
            });
        }

        // --- 5. EVENTI ---
        
        // Pressione pulsante slancio
        document.getElementById('bottone-slancio').addEventListener('click', async () => {
            const todayStr = new Date().toDateString();
            if (state.lastCompletedDate !== todayStr) {
                state.streak += 1;
                state.lastCompletedDate = todayStr;
                render(); 
                await salvaDati(state.streak, state.lastCompletedDate);
            }
        });

        // Gestione To-Do List
        document.getElementById('todo-add').addEventListener('click', () => {
            const input = document.getElementById('todo-input');
            if (input.value.trim() !== '') {
                state.todos.push({ text: input.value.trim(), done: false });
                input.value = '';
                localStorage.setItem('duo_todos_local', JSON.stringify(state.todos));
                render();
            }
        });

        window.toggleTodo = function(index) {
            state.todos[index].done = !state.todos[index].done;
            localStorage.setItem('duo_todos_local', JSON.stringify(state.todos));
            render();
        };

        // Esecuzione all'avvio
        caricaDati();
    </script>
</body>
</html>
