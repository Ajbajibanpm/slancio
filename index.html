<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slancio</title>
    <style>
        :root {
            --bg-color: #f7f9fa;
            --card-bg: #ffffff;
            --text-main: #3c3c3c;
            --text-sub: #afafaf;
            --border-color: #e5e5e5;
            --primary-color: #1cb0f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .widget-container {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 4px 0 var(--border-color);
            margin-bottom: 20px;
        }

        .widget-title {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sub);
            margin-bottom: 10px;
        }

        .streak-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .streak-emoji {
            font-size: 48px;
            line-height: 1;
        }

        .streak-count {
            font-size: 48px;
            font-weight: bold;
            color: var(--text-main);
        }

        .btn-slancio {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #1899d6;
            transition: all 0.1s ease;
            width: 100%;
            text-transform: uppercase;
        }

        .btn-slancio:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-slancio:disabled {
            background-color: var(--border-color);
            box-shadow: 0 4px 0 #cccccc;
            color: var(--text-sub);
            cursor: not-allowed;
        }

        /* Sezione To-Do (Nascondila se vuoi isolare visivamente il widget) */
        .todo-container {
            width: 280px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 0 var(--border-color);
        }

        .todo-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .todo-input {
            flex: 1;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 8px;
            font-size: 14px;
        }

        .todo-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .todo-item input {
            margin-right: 10px;
        }

        /* Nasconde i To-Do se aperto dentro il widget tramite URL parametrizzato */
        body.widget-mode .todo-container {
            display: none;
        }
        body.widget-mode {
            padding: 5px;
            background: transparent;
        }
        body.widget-mode .widget-container {
            margin: 0;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <!-- BLOCCO WIDGET SLANCIO -->
    <div class="widget-container">
        <div id="widget-title" class="widget-title">Nessuno Slancio</div>
        <div class="streak-display">
            <span id="streak-emoji" class="streak-emoji">😴</span>
            <span id="streak-count" class="streak-count">0</span>
        </div>
        <button id="bottone-slancio" class="btn-slancio">Ottieni Slancio</button>
    </div>

    <!-- BLOCCO LISTA DI TASK -->
    <div class="todo-container">
        <div class="todo-input-group">
            <input type="text" id="todo-input" class="todo-input" placeholder="Nuova task...">
            <button id="todo-add" class="todo-btn">+</button>
        </div>
        <ul id="todo-list" class="todo-list"></ul>
    </div>

    <script>
        // --- 1. STATO DELL'APPLICAZIONE ---
        let state = {
            streak: 0,
            lastCompletedDate: null,
            todos: []
        };

        // --- 2. CONTROLLO PARAMETRI URL (Per il Widget sulla Home) ---
        const urlParams = new URLSearchParams(window.location.search);
        const urlStreak = urlParams.get('streak');
        const urlDone = urlParams.get('done');

        const isWidgetMode = (urlStreak !== null);

        if (isWidgetMode) {
            // Attiva la modalità grafica compatta per il widget della Home
            document.body.classList.add('widget-mode');
            state.streak = parseInt(urlStreak, 10) || 0;
            if (urlDone === 'true') {
                state.lastCompletedDate = new Date().toDateString();
            }
        } else {
            // Modalità Browser normale: carica da localStorage
            const savedState = localStorage.getItem('duo_todo_state');
            if (savedState) {
                try {
                    state = JSON.parse(savedState);
                } catch (e) {
                    console.error("Errore nel caricamento dati", e);
                }
            }
        }

        // --- 3. RENDERING GRAFICO ---
        function render() {
            const todayStr = new Date().toDateString();
            const isCompletedToday = state.lastCompletedDate === todayStr;

            // Aggiorna Contatore ed Emoji
            document.getElementById('streak-count').innerText = state.streak;
            
            if (isCompletedToday) {
                document.getElementById('streak-emoji').innerText = '🔥';
                document.getElementById('widget-title').innerText = 'Slancio Attivo!';
                document.getElementById('bottone-slancio').innerText = 'Completato';
                document.getElementById('bottone-slancio').disabled = true;
            } else {
                document.getElementById('streak-emoji').innerText = '😴';
                document.getElementById('widget-title').innerText = 'Nessuno Slancio';
                document.getElementById('bottone-slancio').innerText = 'Ottieni Slancio';
                document.getElementById('bottone-slancio').disabled = false;
            }

            // Genera la lista dei To-Do (se non siamo in modalità widget)
            if (!isWidgetMode) {
                const listEl = document.getElementById('todo-list');
                listEl.innerHTML = '';
                state.todos.forEach((todo, index) => {
                    const li = document.createElement('li');
                    li.className = 'todo-item';
                    li.innerHTML = `
                        <input type="checkbox" ${todo.done ? 'checked' : ''} onchange="toggleTodo(${index})">
                        <span style="${todo.done ? 'text-decoration: line-through; color: #afafaf;' : ''}">${todo.text}</span>
                    `;
                    listEl.appendChild(li);
                });
            }
        }

        // --- 4. FUNZIONI LOGICHE ED EVENTI ---
        
        // Click del bottone Slancio
        document.getElementById('bottone-slancio').addEventListener('click', () => {
            const todayStr = new Date().toDateString();
            if (state.lastCompletedDate !== todayStr) {
                state.streak += 1;
                state.lastCompletedDate = todayStr;
                
                if (!isWidgetMode) {
                    localStorage.setItem('duo_todo_state', JSON.stringify(state));
                }
                
                render();

                // TRUCCO: Genera l'URL aggiornato e naviga su di esso per mostrarlo nella barra indirizzi
                const newUrl = `${window.location.origin}${window.location.pathname}?streak=${state.streak}&done=true`;
                window.location.href = newUrl;
            }
        });

        // Aggiungi Task
        document.getElementById('todo-add').addEventListener('click', () => {
            const input = document.getElementById('todo-input');
            if (input.value.trim() !== '') {
                state.todos.push({ text: input.value.trim(), done: false });
                input.value = '';
                localStorage.setItem('duo_todo_state', JSON.stringify(state));
                render();
            }
        });

        // Cambia stato Task
        window.toggleTodo = function(index) {
            state.todos[index].done = !state.todos[index].done;
            localStorage.setItem('duo_todo_state', JSON.stringify(state));
            render();
        };

        // Avvio iniziale
        render();
    </script>
</body>
</html>
