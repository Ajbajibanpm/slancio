<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='25' fill='%231e293b'/%3E%3Cpath d='M55 15 L25 55 L48 55 L45 85 L75 45 L52 45 Z' fill='%231cb0f6'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='25' fill='%231e293b'/%3E%3Cpath d='M55 15 L25 55 L48 55 L45 85 L75 45 L52 45 Z' fill='%231cb0f6'/%3E%3C/svg%3E">
    <title>Slancio</title>
    <style>
        :root {
            --bg-color: #f7f9fa;
            --card-bg: #ffffff;
            --text-main: #3c3c3c;
            --text-sub: #afafaf;
            --border-color: #e5e5e5;
            --primary-color: #1cb0f6;
            
            --streak-active-bg: #feeeda;
            --streak-active-border: #ff9600;
            --streak-inactive-bg: #e1f5fe;
            --streak-inactive-border: #1cb0f6;
            --streak-lost-bg: #ffebee;
            --streak-lost-border: #ff4b4b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .widget-container {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 4px 0 var(--border-color);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .widget-title {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sub);
            margin-bottom: 5px;
        }

        .motivation-text {
            font-size: 14px;
            font-style: italic;
            color: #777;
            margin-bottom: 10px;
            min-height: 20px;
        }

        .streak-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .streak-emoji {
            font-size: 48px;
            line-height: 1;
        }

        .streak-count {
            font-size: 48px;
            font-weight: bold;
            color: var(--text-main);
        }

        .btn-slancio {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #1899d6;
            transition: all 0.1s ease;
            width: 100%;
            text-transform: uppercase;
        }

        .btn-slancio:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-slancio:disabled {
            background-color: var(--border-color);
            box-shadow: 0 4px 0 #cccccc;
            color: var(--text-sub);
            cursor: not-allowed;
        }

        .todo-container {
            width: 280px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 0 var(--border-color);
            margin-bottom: 20px;
        }

        .todo-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .todo-input {
            flex: 1;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 8px;
            font-size: 14px;
        }

        .todo-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 8px;
            border-bottom: 1px solid var(--border-color);
            background: var(--card-bg);
            cursor: grab;
            user-select: none;
        }

        .todo-item.dragging {
            opacity: 0.5;
            background: #f0f0f0;
        }

        .todo-left {
            display: flex;
            align-items: center;
        }

        .todo-item input {
            margin-right: 10px;
            cursor: pointer;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #ff4b4b;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            padding: 0 5px;
        }

        /* Menu Impostazioni a comparsa */
        .settings-dropdown {
            width: 280px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 4px 0 var(--border-color);
            overflow: hidden;
        }

        .settings-header {
            padding: 12px 20px;
            font-weight: bold;
            font-size: 14px;
            background: #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .settings-content {
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 12px;
            border-top: 2px solid var(--border-color);
        }

        .settings-content.open {
            display: flex;
        }

        .notes-area {
            width: 100%;
            height: 80px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 8px;
            font-family: inherit;
            font-size: 13px;
            resize: vertical;
            box-sizing: border-box;
        }

        .btn-reset {
            background-color: #ff4b4b;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 8px 15px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #d13b3b;
            text-transform: uppercase;
        }

        .btn-reset:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <!-- REPARTO SLANCIO -->
    <div id="streak-card" class="widget-container">
        <div id="widget-title" class="widget-title">Caricamento...</div>
        <div id="motivation" class="motivation-text"></div>
        <div class="streak-display">
            <span id="streak-emoji" class="streak-emoji">😴</span>
            <span id="streak-count" class="streak-count">0</span>
        </div>
        <button id="bottone-slancio" class="btn-slancio" disabled>Attendi...</button>
    </div>

    <!-- REPARTO TO-DO -->
    <div class="todo-container">
        <div class="todo-input-group">
            <input type="text" id="todo-input" class="todo-input" placeholder="Nuova task...">
            <button id="todo-add" class="todo-btn">+</button>
        </div>
        <ul id="todo-list" class="todo-list"></ul>
    </div>

    <!-- PANNELLO IMPOSTAZIONI COMPATTO -->
    <div class="settings-dropdown">
        <div class="settings-header" onclick="toggleSettings()">
            <span>Impostazioni & Note</span>
            <span id="settings-arrow">▼</span>
        </div>
        <div id="settings-content" class="settings-content">
            <textarea id="notes-input" class="notes-area" placeholder="Scrivi qui le tue note o promemoria..."></textarea>
            <button id="btn-reset-streak" class="btn-reset">Azzera Slancio (Test)</button>
        </div>
    </div>

    <script>
        const BIN_ID = "6a3cdb17f5f4af5e292d6e4d"; 

        const API_KEY = "$2a$10$A4j9.t7nUoHpV9/nQxciNu2HkFnnxMr8vyUgtdMvmLIdH8/eU30C2";

        const REQ_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let state = {
            streak: 0,
            lastCompletedDate: "",
            todos: [],
            notes: "",
            isLostState: false
        };

        const frasiAttivo = [
            "Inarrestabile! Continua così!",
            "Il fuoco brucia! Ottimo lavoro!",
            "Nessuno può fermarti oggi!",
            "Slancio mantenuto con successo!"
        ];

        const frasiDaFare = [
            "Completa i tuoi task per accendere il fuoco!",
            "Non spegnere la serie oggi!",
            "Un piccolo sforzo per mantenere lo slancio!",
            "La costanza è la tua arma segreta."
        ];

        const frasiPerso = [
            "Oh no, lo slancio si è spento! Ripartiamo?",
            "Può succedere. L'importante è rialzarsi!",
            "Ricominciamo da 1 oggi stesso!",
            "Il gufo ti osserva... torna in carreggiata!"
        ];

        async function caricaDati() {
            try {
                const res = await fetch(`${REQ_URL}/latest`, {
                    headers: { "X-Master-Key": API_KEY }
                });
                const data = await res.json();
                
                state.streak = data.record.streak || 0;
                state.lastCompletedDate = data.record.lastCompletedDate || "";
                state.todos = data.record.todos || [];
                state.notes = data.record.notes || "";
                state.isLostState = data.record.isLostState || false;

                verificaPassaggioTempo();
            } catch (e) {
                console.error("Errore di rete, uso backup locale:", e);
                const backup = localStorage.getItem('backup_state');
                if (backup) {
                    state = JSON.parse(backup);
                    verificaPassaggioTempo();
                }
            }
            document.getElementById('notes-input').value = state.notes;
            render();
            initDragAndDrop();
        }

        async function salvaDati() {
            state.notes = document.getElementById('notes-input').value;
            localStorage.setItem('backup_state', JSON.stringify(state));
            try {
                await fetch(REQ_URL, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": API_KEY
                    },
                    body: JSON.stringify(state)
                });
            } catch (e) {
                console.error("Impossibile salvare sul server:", e);
            }
        }

        function verificaPassaggioTempo() {
            if (!state.lastCompletedDate) return;

            const oggi = new Date();
            oggi.setHours(0,0,0,0);

            const dataUltimoSlancio = new Date(state.lastCompletedDate);
            dataUltimoSlancio.setHours(0,0,0,0);

            const differenzaTempo = oggi.getTime() - dataUltimoSlancio.getTime();
            const differenzaGiorni = Math.floor(differenzaTempo / (1000 * 60 * 60 * 24));

            if (differenzaGiorni === 1) {
                // Nuovo giorno: i task mantengono il testo ma si svuotano le sbarrature
                state.todos.forEach(t => t.done = false);
                state.isLostState = false;
            } else if (differenzaGiorni > 1) {
                // Saltato il giorno: azzera slancio e toglie sbarrature
                state.streak = 0;
                state.isLostState = true;
                state.todos.forEach(t => t.done = false);
            }
        }

        function prendiFraseRandom(lista) {
            const index = Math.floor(Math.random() * lista.length);
            return lista[index];
        }

        function render() {
            const todayStr = new Date().toDateString();
            const isCompletedToday = state.lastCompletedDate === todayStr;
            
            const card = document.getElementById('streak-card');
            const emojiEl = document.getElementById('streak-emoji');
            const titleEl = document.getElementById('widget-title');
            const btn = document.getElementById('bottone-slancio');
            const motivationEl = document.getElementById('motivation');

            document.getElementById('streak-count').innerText = state.streak;
            
            if (isCompletedToday) {
                card.style.backgroundColor = "var(--streak-active-bg)";
                card.style.borderColor = "var(--streak-active-border)";
                emojiEl.innerText = '🔥';
                titleEl.innerText = 'Slancio Attivo!';
                btn.innerText = 'Completato';
                btn.disabled = true;
                if(!motivationEl.innerText || frasiDaFare.includes(motivationEl.innerText) || frasiPerso.includes(motivationEl.innerText)) {
                    motivationEl.innerText = prendiFraseRandom(frasiAttivo);
                }
            } else if (state.isLostState) {
                card.style.backgroundColor = "var(--streak-lost-bg)";
                card.style.borderColor = "var(--streak-lost-border)";
                emojiEl.innerText = '😢';
                titleEl.innerText = 'Slancio Perso';
                btn.innerText = 'Ripristina Slancio';
                btn.disabled = false;
                if(!motivationEl.innerText || frasiAttivo.includes(motivationEl.innerText) || frasiDaFare.includes(motivationEl.innerText)) {
                    motivationEl.innerText = prendiFraseRandom(frasiPerso);
                }
            } else {
                card.style.backgroundColor = "var(--streak-inactive-bg)";
                card.style.borderColor = "var(--streak-inactive-border)";
                emojiEl.innerText = '😴';
                titleEl.innerText = 'Nessuno Slancio';
                btn.innerText = 'Ottieni Slancio';
                btn.disabled = false;
                if(!motivationEl.innerText || frasiAttivo.includes(motivationEl.innerText) || frasiPerso.includes(motivationEl.innerText)) {
                    motivationEl.innerText = prendiFraseRandom(frasiDaFare);
                }
            }

            const listEl = document.getElementById('todo-list');
            listEl.innerHTML = '';
            state.todos.forEach((todo, index) => {
                const li = document.createElement('li');
                li.className = 'todo-item';
                li.id = `todo-${index}`;
                li.setAttribute('draggable', 'true');
                li.innerHTML = `
                    <div class="todo-left">
                        <input type="checkbox" ${todo.done ? 'checked' : ''} onchange="toggleTodo(${index})">
                        <span style="${todo.done ? 'text-decoration: line-through; color: #afafaf;' : ''}">${todo.text}</span>
                    </div>
                    <button class="btn-delete" onclick="eliminaTodo(${index})">✕</button>
                `;
                listEl.appendChild(li);
            });
        }

        // Gestione drag and drop nativo
        function initDragAndDrop() {
            const list = document.getElementById('todo-list');
            
            list.addEventListener('dragstart', (e) => {
                const target = e.target.closest('.todo-item');
                if (target) target.classList.add('dragging');
            });

            list.addEventListener('dragend', async (e) => {
                const target = e.target.closest('.todo-item');
                if (target) {
                    target.classList.remove('dragging');
                    
                    // Ricostruisci l'array in base all'ordine degli elementi nel DOM
                    const items = Array.from(list.querySelectorAll('.todo-item'));
                    const nuoviTodos = items.map(item => {
                        const index = parseInt(item.id.replace('todo-', ''), 10);
                        return state.todos[index];
                    });
                    
                    state.todos = nuoviTodos;
                    render();
                    await salvaDati();
                    initDragAndDrop(); // Riaggancia gli ID aggiornati
                }
            });

            list.addEventListener('dragover', (e) => {
                e.preventDefault();
                const draggingItem = list.querySelector('.dragging');
                if (!draggingItem) return;
                
                const siblings = Array.from(list.querySelectorAll('.todo-item:not(.dragging)'));
                const nextSibling = siblings.find(sibling => {
                    return e.clientY <= sibling.getBoundingClientRect().top + sibling.getBoundingClientRect().height / 2;
                });
                
                list.insertBefore(draggingItem, nextSibling);
            });
        }

        document.getElementById('bottone-slancio').addEventListener('click', async () => {
            const todayStr = new Date().toDateString();
            if (state.lastCompletedDate !== todayStr) {
                state.streak += 1;
                state.lastCompletedDate = todayStr;
                state.isLostState = false;
                document.getElementById('motivation').innerText = prendiFraseRandom(frasiAttivo);
                render(); 
                await salvaDati();
            }
        });

        document.getElementById('todo-add').addEventListener('click', async () => {
            const input = document.getElementById('todo-input');
            if (input.value.trim() !== '') {
                state.todos.push({ text: input.value.trim(), done: false });
                input.value = '';
                render();
                await salvaDati();
                initDragAndDrop();
            }
        });

        window.toggleTodo = async function(index) {
            state.todos[index].done = !state.todos[index].done;
            render();
            await salvaDati();
            initDragAndDrop();
        };

        window.eliminaTodo = async function(index) {
            state.todos.splice(index, 1);
            render();
            await salvaDati();
            initDragAndDrop();
        };

        // Salvataggio automatico note quando si smette di scrivere
        document.getElementById('notes-input').addEventListener('blur', async () => {
            await salvaDati();
        });

        function toggleSettings() {
            const content = document.getElementById('settings-content');
            const arrow = document.getElementById('settings-arrow');
            content.classList.toggle('open');
            arrow.innerText = content.classList.contains('open') ? '▲' : '▼';
        }

        document.getElementById('btn-reset-streak').addEventListener('click', async () => {
            if (confirm("Vuoi forzare l'azzeramento dello slancio (Simulazione Giorno Perso)?")) {
                state.streak = 0;
                state.lastCompletedDate = "";
                state.isLostState = true;
                state.todos.forEach(t => t.done = false);
                document.getElementById('motivation').innerText = prendiFraseRandom(frasiPerso);
                render();
                await salvaDati();
                initDragAndDrop();
            }
        });

        caricaDati();
    </script>
</body>
</html>
